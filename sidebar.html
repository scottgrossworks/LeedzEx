<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Leedz</title>
  <link rel="stylesheet" href="css/globals.css" />

  <link rel="stylesheet" href="css/leedz_layout.css" />


    <!-- ...existing code... -->
    <script type="module" src="js/sidebar.js"></script>

</head>
<body class="leedz-sidebar">

  <header class="leedz-header">
    <img src="icons/logo_black.png" alt="The Leedz" class="leedz-logo"/>
    <img src="icons/hamburger.png" alt="Menu" class="leedz-hamburger"/>
  </header>

  <main class="leedz-form-section">
    <button class="leedz-button">Friend Chooser</button>

    <label for="name">Name</label>
    <input type="text" class="sidebar-input" id="name" placeholder="Enter name or company"/>

    <label for="date">Event Date</label>
    <input type="date" class="sidebar-input" id="date"/>

    <label for="time">Start Time</label>
    <input type="time" class="sidebar-input" id="time"/>

    <label for="location">Location</label> <!-- green -->
    <input type="text" class="sidebar-input" id="location" placeholder="Street, City, ZIP"/>

    <label for="phone">Phone</label> <!-- green -->
    <div class="input-wrapper">
      <input type="tel" class="sidebar-input" id="phone" placeholder="e.g. 323-555-1212"/>
      <img src="icons/arrows_black.png" alt="arrow" class="input-arrow"/>
    </div>
    
    <label for="email">Email</label> <!-- green -->
    <div class="input-wrapper">
      <input type="email" class="sidebar-input" id="email" placeholder="example@email.com"/>
      <img src="icons/arrows_black.png" alt="arrow" class="input-arrow"/>
    </div>

    <label for="notes">Notes / Requirements</label>
    <textarea id="notes" class="sidebar-input" placeholder="e.g. Company party, bring lighting..."></textarea>

    <button class="leedz-button">Price Chooser</button>
  </main>

  <footer class="leedz-footer">
    <img src="icons/grass.png" alt="grass" class="leedz-grass"/>
    <ul class="leedz-footer-links">
      <li><a href="/about">About the Leedz</a></li>
      <li><a href="/contact">Contact Us</a></li>
    </ul>
  </footer>

</body>
</html>
